server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Server-scope security headers — applied to responses that don't enter a
  # location with its own add_header. Locations that set Cache-Control MUST
  # `include security-headers.conf` (nginx add_header does NOT inherit from
  # parent if the child has any add_header of its own).
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "interest-cohort=()" always;
  add_header X-Frame-Options "DENY" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
  add_header Cache-Control "no-cache" always;

  location = /health {
    access_log off;
    include /etc/nginx/conf.d/security-headers.conf;
    add_header Cache-Control "no-store" always;
    return 200 "ok\n";
  }

  location = /styles.css {
    include /etc/nginx/conf.d/security-headers.conf;
    add_header Cache-Control "public, max-age=3600, must-revalidate" always;
  }

  location /assets/ {
    include /etc/nginx/conf.d/security-headers.conf;
    add_header Cache-Control "public, max-age=86400" always;
  }
}
