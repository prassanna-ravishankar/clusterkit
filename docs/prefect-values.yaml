# Prefect Server Helm values for ClusterKit
# Internal-only deployment with Cloud SQL PostgreSQL
#
# Prerequisites:
# 1. Create namespace: kubectl create namespace prefect
# 2. Create secret with connection string:
#    kubectl create secret generic prefect-postgresql-connection -n prefect \
#      --from-literal=connection-string='postgresql+asyncpg://prefect:<PASSWORD>@127.0.0.1:5432/prefect'
#
# Install:
#   helm install prefect-server prefect/prefect-server -n prefect -f docs/prefect-values.yaml
#
# Access UI (internal only):
#   kubectl port-forward svc/prefect-server -n prefect 4200:4200
#   Open http://localhost:4200

# Disable built-in PostgreSQL - using Cloud SQL
postgresql:
  enabled: false

# Use existing secret with connection string
secret:
  create: false
  name: "prefect-postgresql-connection"

# Server configuration
server:
  # Spot Pods for cost savings (60-91% reduction)
  nodeSelector:
    cloud.google.com/gke-spot: "true"

  tolerations:
    - key: cloud.google.com/gke-spot
      operator: Equal
      value: "true"
      effect: NoSchedule

  # Reduced resources for side project
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Cloud SQL Proxy sidecar
  extraContainers:
    - name: cloud-sql-proxy
      image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.19.0
      args:
        - "--structured-logs"
        - "--port=5432"
        - "baldmaninc:us-central1:clusterkit-db"
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - NET_RAW

# Service account with Workload Identity
serviceAccount:
  create: true
  name: "prefect-sa"
  annotations:
    iam.gke.io/gcp-service-account: "cloudsql-proxy@baldmaninc.iam.gserviceaccount.com"

# Service configuration
service:
  port: 4200
  targetPort: 4200
